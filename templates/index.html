<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TG Cloud — Архиватор Telegram</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root.light {
            --bg-primary: #f5f7fa;
            --bg-secondary: #e9ecef;
            --bg-card: #ffffff;
            --bg-glass: rgba(29, 72, 227, 0.06);
            --bg-glass-hover: rgba(29, 72, 227, 0.12);
            --bg-glass-strong: rgba(29, 72, 227, 0.15);
            --text-primary: #1a1a1a;
            --text-secondary: #5a5a5a;
            --text-accent: #1d48e3;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.08);
            --border-radius: 24px;
            --border-radius-medium: 16px;
            --message-in: #ffffff;
            --message-out: #1d48e3;
            --message-out-text: #ffffff;
            --message-in-text: #1a1a1a;
        }

        :root.dark {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-card: #1e1e1e;
            --bg-glass: rgba(29, 72, 227, 0.12);
            --bg-glass-hover: rgba(29, 72, 227, 0.2);
            --bg-glass-strong: rgba(29, 72, 227, 0.25);
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --text-accent: #4b87fd;
            --border-color: rgba(255, 255, 255, 0.08);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.3);
            --border-radius: 24px;
            --border-radius-medium: 16px;
            --message-in: #1e1e1e;
            --message-out: #1d48e3;
            --message-out-text: #ffffff;
            --message-in-text: #e0e0e0;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        .header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1d48e3 0%, #4b87fd 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .stats-row {
            display: flex;
            gap: 12px;
            background: var(--bg-glass);
            border-radius: 40px;
            padding: 8px 16px;
        }

        .stat-badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .stat-badge i {
            color: var(--text-accent);
            margin-right: 4px;
        }

        .main-container {
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 80px;
        }

        .chats-list {
            padding: 0 16px;
        }

        .chat-item {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-item:hover {
            transform: translateX(4px);
            border-color: var(--text-accent);
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: var(--bg-glass-strong);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-accent);
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 700;
            margin-bottom: 4px;
            word-break: break-word;
        }

        .chat-preview {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .chat-deleted-count {
            background: rgba(220, 38, 38, 0.2);
            color: #dc2626;
            border-radius: 12px;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .chat-window {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
        }

        .chat-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 60px;
            z-index: 90;
        }

        .back-btn {
            background: var(--bg-glass);
            border: none;
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .chat-title {
            flex: 1;
            font-weight: 700;
            word-break: break-word;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.in {
            justify-content: flex-start;
        }

        .message-row.out {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 20px;
            position: relative;
        }

        .message-row.in .message-bubble {
            background: var(--message-in);
            border: 1px solid var(--border-color);
            border-bottom-left-radius: 4px;
            color: var(--message-in-text);
        }

        .message-row.out .message-bubble {
            background: var(--message-out);
            border-bottom-right-radius: 4px;
            color: var(--message-out-text);
        }

        .message-text {
            font-size: 0.9rem;
            word-break: break-word;
            line-height: 1.4;
        }

        .message-text.media {
            opacity: 0.7;
            font-style: italic;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
        }

        .message-row.out .message-time {
            text-align: right;
        }

        .deleted-marker {
            font-size: 0.65rem;
            color: #dc2626;
            margin-top: 4px;
        }

        .deleted-bubble {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loader i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .bottom-nav {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .nav-btn {
            background: var(--bg-glass);
            border: none;
            border-radius: 25px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background: var(--bg-glass-hover);
            transform: translateY(-2px);
        }

        .nav-btn.danger {
            background: rgba(220, 38, 38, 0.15);
            color: #dc2626;
        }

        .footer {
            background: var(--bg-secondary);
            padding: 16px;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-secondary);
            border-top: 1px solid var(--border-color);
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1d48e3;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            z-index: 1001;
            display: none;
            white-space: nowrap;
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 600px) {
            .message-bubble { max-width: 85%; }
            .nav-btn { padding: 8px 14px; font-size: 0.75rem; }
            .nav-btn span { display: none; }
            .nav-btn i { margin: 0; }
            .bottom-nav { padding: 8px 12px; gap: 4px; }
            .stats-row span:not(.stat-badge) { display: none; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo"><i class="fab fa-telegram"></i> TG Cloud</div>
            <div class="header-right">
                <div class="stats-row">
                    <div class="stat-badge"><i class="fas fa-inbox"></i> <span id="statTotal">0</span></div>
                    <div class="stat-badge"><i class="fas fa-trash-alt"></i> <span id="statDeleted">0</span></div>
                </div>
                <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i> <span>Тёмная</span></button>
            </div>
        </div>
    </header>

    <div class="main-container" id="mainContainer">
        <div id="chatsView" class="chats-list"><div class="loader"><i class="fas fa-spinner"></i> Загрузка чатов...</div></div>
        <div id="chatView" class="chat-window" style="display: none;">
            <div class="chat-header">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                <div class="chat-title" id="chatTitle">Чат</div>
            </div>
            <div class="messages-area" id="messagesArea"><div class="loader"><i class="fas fa-spinner"></i> Загрузка...</div></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn" id="navAllBtn"><i class="fas fa-list"></i> <span>Все чаты</span></button>
        <button class="nav-btn" id="navRefreshBtn"><i class="fas fa-sync-alt"></i> <span>Обновить</span></button>
        <button class="nav-btn danger" id="navDeletedBtn"><i class="fas fa-trash-alt"></i> <span>Удалённые</span></button>
    </div>

    <div id="toast" class="toast"><i class="fas fa-trash-alt"></i> Удалено новое сообщение!</div>

    <footer class="footer"><p>🔒 Все сообщения сохраняются на сервере. Удалённые сообщения остаются в архиве.</p></footer>

    <script>
        let currentView = 'chats', currentChatId = null, currentMode = 'all', lastDeletedCount = 0, autoRefreshInterval = null;
        let isDark = localStorage.getItem('theme') === 'dark';
        
        function initTheme() {
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.documentElement.classList.remove('light');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-sun"></i> <span>Светлая</span>';
            } else {
                document.documentElement.classList.add('light');
                document.documentElement.classList.remove('dark');
                document.getElementById('themeToggle').innerHTML = '<i class="fas fa-moon"></i> <span>Тёмная</span>';
            }
        }
        
        document.getElementById('themeToggle').addEventListener('click', () => { isDark = !isDark; localStorage.setItem('theme', isDark ? 'dark' : 'light'); initTheme(); });
        initTheme();
        
        function formatTime(d) { return new Date(d).toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }); }
        function formatDate(d) { const date=new Date(d), now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate()), msgDate=new Date(date.getFullYear(),date.getMonth(),date.getDate()); return msgDate.getTime()===today.getTime()?formatTime(d):date.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}); }
        function escapeHtml(t){if(!t)return'';return t.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});}
        function getInitials(n){if(!n)return'?';const p=n.split(' ');if(p.length>=2)return(p[0][0]+p[1][0]).toUpperCase();return n.slice(0,2).toUpperCase();}
        
        async function loadStats(){try{const r=await fetch('/api/stats'),s=await r.json();document.getElementById('statTotal').textContent=s.total;document.getElementById('statDeleted').textContent=s.deleted;if(s.deleted>lastDeletedCount&&lastDeletedCount!==0){const t=document.getElementById('toast');t.style.display='block';setTimeout(()=>{t.style.display='none';},3000);}lastDeletedCount=s.deleted;}catch(e){}}
        
        async function loadChats(){
            const c=document.getElementById('chatsView');
            c.innerHTML='<div class="loader"><i class="fas fa-spinner"></i> Загрузка чатов...</div>';
            try{
                const r=await fetch('/api/chats'),chats=await r.json();
                if(!chats.length){c.innerHTML='<div class="empty-state"><i class="fas fa-inbox" style="font-size:3rem;opacity:0.5"></i><p>Нет сообщений</p></div>';return;}
                c.innerHTML=chats.map(chat=>`<div class="chat-item" data-chat-id="${escapeHtml(chat.chat_id)}"><div class="chat-avatar">${escapeHtml(getInitials(chat.chat_id))}</div><div class="chat-info"><div class="chat-name">${escapeHtml(chat.chat_id)}</div><div class="chat-preview">${chat.total} сообщений</div></div>${chat.deleted>0?`<div class="chat-deleted-count">🗑️ ${chat.deleted}</div>`:''}</div>`).join('');
                document.querySelectorAll('.chat-item').forEach(el=>{el.addEventListener('click',()=>{openChat(el.dataset.chatId);});});
            }catch(e){c.innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Ошибка загрузки</p></div>';}
        }
        
        async function openChat(chatId){
            currentChatId=chatId;
            currentView='chat';
            document.getElementById('chatsView').style.display='none';
            document.getElementById('chatView').style.display='flex';
            document.getElementById('chatTitle').textContent=chatId.length>30?chatId.slice(0,27)+'...':chatId;
            await loadMessagesInChat();
        }
        
        async function loadMessagesInChat(){
            const ma=document.getElementById('messagesArea');
            ma.innerHTML='<div class="loader"><i class="fas fa-spinner"></i> Загрузка...</div>';
            try{
                let url=currentMode==='deleted_only'?'/api/deleted-only?limit=500':`/api/messages?chat=${encodeURIComponent(currentChatId)}&deleted=true&limit=500`;
                const r=await fetch(url),msgs=await r.json();
                if(!msgs.length){ma.innerHTML='<div class="empty-state"><p>Нет сообщений</p></div>';return;}
                ma.innerHTML=msgs.map(msg=>{const isOutgoing=msg.sender_name==='You'||msg.sender_id==='me',isDeleted=msg.is_deleted===1||msg.is_deleted_flag===1,rowClass=isOutgoing?'out':'in',bubbleClass=isDeleted?'deleted-bubble':'',deletedBadge=isDeleted?'<div class="deleted-marker"><i class="fas fa-trash-alt"></i> Удалено автором</div>':'';let mc=msg.text||'[медиафайл]';if(msg.media_type!=='none'&&!msg.text)mc='<i class="fas fa-paperclip"></i> '+mc;return`<div class="message-row ${rowClass}"><div class="message-bubble ${bubbleClass}"><div class="message-text ${!msg.text?'media':''}">${escapeHtml(mc)}</div><div class="message-time">${formatDate(msg.date)}</div>${deletedBadge}</div></div>`;}).join('');
                ma.scrollTop=ma.scrollHeight;
            }catch(e){ma.innerHTML='<div class="empty-state"><p>Ошибка загрузки</p></div>';}
        }
        
        function showAllChats(){currentView='chats';currentChatId=null;document.getElementById('chatsView').style.display='block';document.getElementById('chatView').style.display='none';loadChats();loadStats();}
        async function refresh(){if(currentView==='chats')await loadChats();else if(currentView==='chat')await loadMessagesInChat();await loadStats();const t=document.getElementById('toast');t.style.display='block';t.innerHTML='<i class="fas fa-check-circle"></i> Обновлено!';setTimeout(()=>{t.style.display='none';},1500);}
        async function showOnlyDeleted(){if(currentView==='chats'){await loadChats();}else if(currentView==='chat'){currentMode='deleted_only';await loadMessagesInChat();}await loadStats();}
        
        document.getElementById('backBtn').addEventListener('click',showAllChats);
        document.getElementById('navAllBtn').addEventListener('click',()=>{currentMode='all';showAllChats();});
        document.getElementById('navRefreshBtn').addEventListener('click',refresh);
        document.getElementById('navDeletedBtn').addEventListener('click',()=>{currentMode='deleted_only';if(currentView==='chats')showAllChats();else loadMessagesInChat();});
        
        function startAutoRefresh(){if(autoRefreshInterval)clearInterval(autoRefreshInterval);autoRefreshInterval=setInterval(()=>{if(currentView==='chat'&&currentMode!=='deleted_only')loadMessagesInChat();loadStats();},10000);}
        
        async function init(){await loadChats();await loadStats();startAutoRefresh();}
        init();
    </script>
</body>
</html>
