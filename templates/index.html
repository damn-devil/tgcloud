<!DOCTYPE html>
<html>
<head>
    <title>Telegram Archiver - Удалённые сообщения</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
        
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Шапка */
        .header { background: linear-gradient(135deg, #1e2a3a 0%, #0f1a24 100%); padding: 25px; border-radius: 15px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { font-size: 28px; margin-bottom: 10px; }
        h1 span.count { background: #dc2626; padding: 3px 10px; border-radius: 20px; font-size: 16px; margin-left: 10px; }
        .stats { display: flex; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .stat-card { background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 10px; }
        .stat-card .number { font-size: 24px; font-weight: bold; color: #6ab0f5; }
        .stat-card .label { font-size: 12px; color: #888; }
        .stat-card.deleted .number { color: #dc2626; }
        
        /* Панель управления */
        .controls { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        select, input, button { padding: 10px 15px; background: #2a2a2a; color: white; border: 1px solid #3a3a3a; border-radius: 8px; cursor: pointer; }
        select { min-width: 250px; }
        button { background: #2b5278; border-color: #3a6a98; transition: all 0.2s; }
        button:hover { background: #3a6a98; }
        .btn-danger { background: #7a2e2e; border-color: #aa3e3e; }
        .btn-danger:hover { background: #aa3e3e; }
        .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        
        /* Сообщения */
        .message { background: #141414; border-left: 4px solid #2b5278; padding: 15px; margin: 12px 0; border-radius: 8px; transition: all 0.2s; }
        .message.deleted { border-left-color: #dc2626; background: #1a0f0f; opacity: 0.85; }
        .message.deleted .sender { color: #ff6b6b; text-decoration: line-through; }
        .deleted-badge { display: inline-block; background: #dc2626; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 10px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        
        .message-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .sender { font-weight: bold; color: #6ab0f5; }
        .time { font-size: 11px; color: #666; }
        .message-text { margin-top: 10px; line-height: 1.5; }
        .message-text.original { opacity: 0.6; font-size: 13px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #2a2a2a; }
        
        /* Уведомление о новом удалённом */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #dc2626; color: white; padding: 15px 25px; border-radius: 10px; display: none; z-index: 1000; animation: slideIn 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .empty { text-align: center; padding: 50px; color: #666; }
        .deleted-separator { margin: 30px 0 20px; font-size: 20px; font-weight: bold; border-bottom: 2px solid #dc2626; display: inline-block; padding-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🗑️ Telegram Archiver <span id="deletedCountBadge" class="count">0</span></h1>
        <div class="stats" id="stats"></div>
    </div>
    
    <div class="controls">
        <select id="chatSelect" onchange="loadAll()">
            <option value="">📁 Все чаты</option>
        </select>
        
        <label class="checkbox-label">
            <input type="checkbox" id="showDeleted" checked onchange="loadMessages()">
            🗑️ Показывать удалённые
        </label>
        
        <button onclick="loadMessages()" style="background: #2b5278;">🔄 Обновить</button>
        <button onclick="showOnlyDeleted()" class="btn-danger">⚠️ Только удалённые</button>
        <button onclick="loadAll()">📊 Все сообщения</button>
    </div>
    
    <div id="messages"></div>
    <div id="deletedSection"></div>
</div>

<div id="toast" class="toast">🗑️ Новое удалённое сообщение!</div>

<script>
    let lastDeletedCount = 0;
    
    // Загрузка статистики
    async function loadStats() {
        const resp = await fetch('/api/stats');
        const stats = await resp.json();
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><div class="number">${stats.total}</div><div class="label">Всего сообщений</div></div>
            <div class="stat-card deleted"><div class="number">${stats.deleted}</div><div class="label">Удалено</div></div>
            <div class="stat-card"><div class="number">${stats.percent_deleted}%</div><div class="label">% удалённых</div></div>
        `;
        document.getElementById('deletedCountBadge').innerHTML = `🗑️ ${stats.deleted}`;
        
        // Уведомление о новых удалённых
        if (stats.deleted > lastDeletedCount && lastDeletedCount !== 0) {
            showToast();
        }
        lastDeletedCount = stats.deleted;
        setTimeout(loadStats, 30000); // Обновляем статистику каждые 30 секунд
    }
    
    function showToast() {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
    
    // Загрузка списка чатов
    async function loadChats() {
        const resp = await fetch('/api/chats');
        const chats = await resp.json();
        const select = document.getElementById('chatSelect');
        select.innerHTML = '<option value="">📁 Все чаты</option>';
        chats.forEach(chat => {
            const option = document.createElement('option');
            option.value = chat.chat_id;
            const deletedMark = chat.deleted > 0 ? ` 🗑️${chat.deleted}` : '';
            option.textContent = `${chat.chat_id.substring(0, 30)} (${chat.total}${deletedMark})`;
            select.appendChild(option);
        });
    }
    
    // Форматирование даты
    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        if (diff < 60000) return 'только что';
        if (diff < 3600000) return `${Math.floor(diff/60000)} мин назад`;
        if (diff < 86400000) return `${Math.floor(diff/3600000)} ч назад`;
        return date.toLocaleString('ru-RU', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
    }
    
    // Экранирование HTML
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Загрузка сообщений
    async function loadMessages() {
        const chatId = document.getElementById('chatSelect').value;
        const showDeleted = document.getElementById('showDeleted').checked;
        const resp = await fetch(`/api/messages?chat=${encodeURIComponent(chatId)}&deleted=${showDeleted}&limit=500`);
        const messages = await resp.json();
        
        const container = document.getElementById('messages');
        if (messages.length === 0) {
            container.innerHTML = '<div class="empty">📭 Нет сообщений</div>';
            return;
        }
        
        container.innerHTML = messages.map(msg => {
            const isDeleted = msg.is_deleted === 1 || msg.is_deleted_flag === 1;
            const deletedClass = isDeleted ? 'deleted' : '';
            const deletedBadge = isDeleted ? '<span class="deleted-badge">🗑️ УДАЛЕНО АВТОРОМ</span>' : '';
            
            return `
                <div class="message ${deletedClass}" data-msg-id="${msg.message_id}">
                    <div class="message-header">
                        <div>
                            <span class="sender">📱 ${escapeHtml(msg.sender_name || msg.sender_id)}</span>
                            ${deletedBadge}
                        </div>
                        <div class="time">${formatDate(msg.date)}</div>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text) || '<em class="empty">[медиафайл]</em>'}</div>
                    ${msg.media_type !== 'none' ? `<div class="time">📎 Медиа: ${msg.media_type}</div>` : ''}
                    ${msg.deleted_at && isDeleted ? `<div class="time">🗑️ Удалено: ${formatDate(msg.deleted_at)}</div>` : ''}
                    ${msg.edit_history ? `<div class="message-text original">✏️ История редактирования: ${escapeHtml(msg.edit_history.substring(0, 200))}</div>` : ''}
                </div>
            `;
        }).join('');
    }
    
    // Показать только удалённые
    async function showOnlyDeleted() {
        const resp = await fetch('/api/deleted-only?limit=200');
        const messages = await resp.json();
        
        const container = document.getElementById('messages');
        if (messages.length === 0) {
            container.innerHTML = '<div class="empty">✅ Нет удалённых сообщений</div>';
            return;
        }
        
        container.innerHTML = `
            <div class="deleted-separator">🗑️ УДАЛЁННЫЕ СООБЩЕНИЯ (${messages.length})</div>
            ${messages.map(msg => `
                <div class="message deleted">
                    <div class="message-header">
                        <div>
                            <span class="sender">🗑️ ${escapeHtml(msg.sender_name || msg.sender_id)}</span>
                            <span class="deleted-badge">УДАЛЕНО</span>
                        </div>
                        <div class="time">Удалено: ${formatDate(msg.deleted_at)}</div>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text) || '<em>[медиафайл]</em>'}</div>
                    <div class="message-text original">📅 Оригинал: ${formatDate(msg.date)}</div>
                    ${msg.media_type !== 'none' ? `<div class="time">📎 Медиа: ${msg.media_type}</div>` : ''}
                </div>
            `).join('')}
        `;
    }
    
    async function loadAll() {
        document.getElementById('showDeleted').checked = true;
        await loadMessages();
        await loadStats();
    }
    
    // Автообновление каждые 10 секунд
    setInterval(() => {
        const onlyDeletedMode = document.getElementById('messages').innerHTML.includes('УДАЛЁННЫЕ СООБЩЕНИЯ');
        if (!onlyDeletedMode) {
            loadMessages();
        }
        loadStats();
    }, 10000);
    
    loadChats();
    loadMessages();
    loadStats();
</script>
</body>
</html>
